<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Synth Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            pink: '#ff2a6d',
                            cyan: '#05d9e8',
                            blue: '#01abe9',
                            dark: '#0a0a0a',
                            purple: '#b300ff'
                        }
                    },
                    boxShadow: {
                        'neon-pink': '0 0 10px #ff2a6d, 0 0 20px #ff2a6d',
                        'neon-cyan': '0 0 10px #05d9e8, 0 0 20px #05d9e8',
                        'neon-purple': '0 0 10px #b300ff, 0 0 20px #b300ff',
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            margin: 0;
            overflow: hidden; /* Prevent scrolling when playing */
        }
        /* Custom scrollbar for a cleaner look if needed */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #05d9e8;
            border-radius: 4px;
        }
    </style>
    </head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
